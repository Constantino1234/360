<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>VR Game: La Maldición del Guardián (Reinicio Blindado)</title>
    <meta name="description" content="Juego interactivo en VR con sistema de reinicio independiente y blindado">
    
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

    <script>
      // VARIABLES GLOBALES DEL JUEGO
      window.puntos = 0;
      window.juegoTerminado = false;
      window.juegoIniciado = false;
      window.bucleExplosion = null; // Variable para poder frenar la explosión por completo

      // 1. COMPONENTE PARA EL BOTÓN DE INICIO 3D
      AFRAME.registerComponent('boton-inicio-vr', {
        init: function () {
          var el = this.el;
          el.addEventListener('mouseenter', function () {
            if (window.juegoIniciado) return;
            
            window.juegoIniciado = true;
            
            // Ocultar menú de bienvenida enviándolo lejos
            var menu = document.getElementById('menu-bienvenida-3d');
            menu.setAttribute('position', '0 -100 0');
            menu.setAttribute('visible', 'false');

            // Hacemos aparecer los tres objetos individualmente al iniciar
            document.getElementById('item-cofre').setAttribute('visible', 'true');
            document.getElementById('item-world').setAttribute('visible', 'true');
            document.getElementById('item-esqueleto').setAttribute('visible', 'true');
          });
        }
      });

      // 2. COMPONENTE PARA EL BOTÓN DE REINICIO 3D (Blindado y 100% independiente)
      AFRAME.registerComponent('boton-reiniciar-vr', {
        init: function () {
          var el = this.el;
          el.addEventListener('mouseenter', function () {
            if (!window.juegoTerminado) return;

            // Frenar cualquier bucle de explosión que se haya quedado activo en segundo plano
            if (window.bucleExplosion) {
              clearInterval(window.bucleExplosion);
            }

            // 1. Resetear variables de estado del juego
            window.puntos = 0;
            window.juegoTerminado = false;

            // 2. Limpiar todos los textos de la interfaz (HUD)
            document.getElementById('texto-puntos').setAttribute('value', 'Puntos: 0 / 3');
            document.getElementById('texto-pantalla').setAttribute('value', '');

            // 3. Ocultar por completo el menú de fin de juego (enviándolo abajo)
            var menuFin = document.getElementById('menu-fin-3d');
            menuFin.setAttribute('position', '0 -100 0');
            menuFin.setAttribute('visible', 'false');

            // 4. Forzar el reinicio manual e independiente de CADA OBJETO
            var cofre = document.getElementById('item-cofre');
            var mundo = document.getElementById('item-world');
            var skele = document.getElementById('item-esqueleto');

            // Reinicio completo del Cofre (posición inicial al frente)
            cofre.setAttribute('position', '0 0 -7');
            cofre.setAttribute('rotation', '0 0 0');
            cofre.setAttribute('scale', '1 1 1');
            cofre.setAttribute('visible', 'true');

            // Reinicio completo del Mundo/Planeta Trampa (atrás a la derecha)
            mundo.setAttribute('position', '6 1 4');
            mundo.setAttribute('rotation', '0 0 0');
            mundo.setAttribute('scale', '0.1 0.1 0.1');
            mundo.setAttribute('visible', 'true');

            // Reinicio completo del Esqueleto (atrás a la izquierda)
            skele.setAttribute('position', '-6 -1.2 3');
            skele.setAttribute('rotation', '0 120 0');
            skele.setAttribute('scale', '1 1 1');
            skele.setAttribute('visible', 'true');
          });
        }
      });

      // Función global que activa el Fin del Juego en 3D
      function activarFinJuego(mensaje, colorTexto) {
        window.juegoTerminado = true;

        // Ocultamos los objetos para que el menú de fin de juego se vea limpio en VR
        document.getElementById('item-cofre').setAttribute('visible', 'false');
        document.getElementById('item-world').setAttribute('visible', 'false');
        document.getElementById('item-esqueleto').setAttribute('visible', 'false');

        // Modificamos el cartel de Fin de Juego 3D con los textos correspondientes
        document.getElementById('titulo-fin').setAttribute('value', mensaje);
        document.getElementById('titulo-fin').setAttribute('color', colorTexto);
        document.getElementById('subtitulo-fin').setAttribute('value', 'Puntuacion final: ' + window.puntos + ' puntos');

        // Colocamos el menú de fin justo enfrente de los ojos del jugador en el espacio VR
        var menuFin = document.getElementById('menu-fin-3d');
        menuFin.setAttribute('position', '0 0 -2.5');
        menuFin.setAttribute('visible', 'true');
      }

      // 3. COMPONENTE DEL COFRE
      AFRAME.registerComponent('cofre-juego', {
        init: function () {
          var el = this.el;
          el.addEventListener('mouseenter', function () {
            if (window.juegoTerminado || !window.juegoIniciado) return;

            window.puntos++;
            document.getElementById('texto-puntos').setAttribute('value', 'Puntos: ' + window.puntos + ' / 3');

            if (window.puntos >= 3) {
              activarFinJuego('¡VICTORIA VIRTUAL!', '#00FF00');
              return;
            }

            // Dispersión del cofre en 360 grados
            var angulo = Math.random() * Math.PI * 2;
            var radio = 8.5; 
            var nuevoX = Math.cos(angulo) * radio;
            var nuevoZ = Math.sin(angulo) * radio;
            var nuevoY = (Math.random() * 5.5) - 3; 

            el.setAttribute('position', `${nuevoX} ${nuevoY} ${nuevoZ}`);
            el.setAttribute('rotation', `0 ${Math.random() * 360} 0`);
          });
        }
      });

      // 4. COMPONENTE DEL ESQUELETO
      AFRAME.registerComponent('esqueleto-enemigo', {
        init: function () {
          var el = this.el;
          el.addEventListener('mouseenter', function () {
            if (window.juegoTerminado || !window.juegoIniciado) return;

            if (window.puntos > 0) {
              window.puntos--;
              document.getElementById('texto-puntos').setAttribute('value', 'Puntos: ' + window.puntos + ' / 3');
            }

            document.getElementById('texto-pantalla').setAttribute('value', '¡EL ESQUELETO TE ATACÓ!\n-1 Punto');
            document.getElementById('texto-pantalla').setAttribute('color', '#FFCC00');
            
            setTimeout(function() {
              if (!window.juegoTerminado) {
                document.getElementById('texto-pantalla').setAttribute('value', '');
              }
            }, 2000);

            var angulo = Math.random() * Math.PI * 2;
            var radio = 7.5;
            var nuevoX = Math.cos(angulo) * radio;
            var nuevoZ = Math.sin(angulo) * radio;
            el.setAttribute('position', `${nuevoX} -1.2 ${nuevoZ}`);
            
            var rotacionY = Math.atan2(nuevoX, nuevoZ) * (180 / Math.PI) + 180;
            el.setAttribute('rotation', `0 ${rotacionY} 0`);
          });
        }
      });

      // 5. COMPONENTE DEL MUNDO TRAMPA (EXPLOSIÓN)
      AFRAME.registerComponent('mundo-bomba', {
        init: function () {
          var el = this.el;

          el.addEventListener('mouseenter', function () {
            if (window.juegoTerminado || !window.juegoIniciado) return;

            window.juegoTerminado = true;

            document.getElementById('texto-pantalla').setAttribute('value', '¡BOOM!');
            document.getElementById('texto-pantalla').setAttribute('color', '#FF0000');

            // Crear el efecto visual de la bola de fuego
            var posicion = el.getAttribute('position');
            var fuego = document.createElement('a-sphere');
            fuego.setAttribute('position', posicion);
            fuego.setAttribute('color', '#FF4500');
            fuego.setAttribute('radius', '0.3');
            fuego.setAttribute('material', 'transparent: true; opacity: 0.9; shader: flat');
            el.sceneEl.appendChild(fuego);

            var radioFuego = 0.3;
            var opacidadFuego = 0.9;
            
            // Guardamos el intervalo en la variable global para poder apagarlo al reiniciar
            window.bucleExplosion = setInterval(function() {
              radioFuego += 0.3;
              opacidadFuego -= 0.05; 
              
              fuego.setAttribute('radius', radioFuego);
              fuego.setAttribute('material', 'opacity: ' + opacidadFuego);

              var escalaActual = el.getAttribute('scale');
              el.setAttribute('scale', {
                x: escalaActual.x * 1.2, 
                y: escalaActual.y * 1.2, 
                z: escalaActual.z * 1.2
              });

              if (opacidadFuego <= 0) {
                clearInterval(window.bucleExplosion);
                if (fuego.parentNode) fuego.parentNode.removeChild(fuego);
                
                // Lanzamos de inmediato el menú de fin de juego
                activarFinJuego('GAME OVER\nPlaneta Destruido', '#FF0000');
              }
            }, 30);
          });
        }
      });
    </script>
  </head>
  <body>

    <a-scene background="color: #FFFFFF">
     
      <a-assets>
        <a-asset-item id="model-cofre" src="pixellabs-treasure-chest-3502.glb"></a-asset-item>
        <a-asset-item id="model-mundo" src="timeworx-world-4045.glb"></a-asset-item>
        <a-asset-item id="model-esqueleto" src="quaternius_cc0-skeleton-1343.glb"></a-asset-item>
      </a-assets>

      <a-cylinder src="foto.jpg" radius="10" height="10" open-ended="true" material="side: back"></a-cylinder>

      <a-circle position="0 -5.01 0" rotation="-90 0 0" radius="10.05" color="#ffffff" side="double"></a-circle>
      <a-circle position="0 5.01 0" rotation="90 0 0" radius="10.05" color="#ffffff" side="double"></a-circle>


      <a-entity id="menu-bienvenida-3d" position="0 0 -2.5" visible="true">
        <a-plane color="#0f0f19" width="3.4" height="2.4" opacity="0.95"></a-plane>
        <a-text value="LA MALDICION DEL GUARDIAN" align="center" position="0 0.9 0.02" width="4.5" color="#FFCC00" font="mozillavr"></a-text>
        <a-text value="Mini-Juego de Supervivencia VR" align="center" position="0 0.7 0.02" width="3.2" color="#888" font="mozillavr"></a-text>
        <a-text value="REGLAS:\n1. COFRE: Miralo 3 veces para ganar (Huye al mirarlo).\n2. ESQUELETO: Si lo miras te ataca y resta 1 punto.\n3. PLANETA: Si lo miras EXPLOTA y pierdes." 
                align="left" position="-1.5 0.1 0.02" width="2.8" color="#FFFFFF" font="mozillavr"></a-text>
        
        <a-plane boton-inicio-vr color="#FFCC00" width="2.2" height="0.35" position="0 -0.8 0.03">
          <a-text value="MIRA AQUI PARA EMPEZAR" align="center" color="#111111" width="3.8" position="0 0 0.01" font="mozillavr"></a-text>
        </a-plane>
      </a-entity>


      <a-entity id="menu-fin-3d" position="0 -100 0" visible="false">
        <a-plane color="#1a0505" width="3.0" height="1.8" opacity="0.95"></a-plane>
        <a-text id="titulo-fin" value="GAME OVER" align="center" position="0 0.5 0.02" width="5" color="#FF0000" font="mozillavr"></a-text>
        <a-text id="subtitulo-fin" value="Puntuacion: 0 puntos" align="center" position="0 0.1 0.02" width="3.5" color="#FFF" font="mozillavr"></a-text>
        
        <a-plane boton-reiniciar-vr color="#D32F2F" width="2.0" height="0.35" position="0 -0.5 0.03">
          <a-text value="MIRA AQUI PARA REINICIAR" align="center" color="#FFFFFF" width="3.8" position="0 0 0.01" font="mozillavr"></a-text>
        </a-plane>
      </a-entity>


      <a-entity id="item-cofre" cofre-juego gltf-model="#model-cofre" position="0 0 -7" scale="1 1 1" rotation="0 0 0" visible="false"></a-entity>
      
      <a-entity id="item-world" mundo-bomba gltf-model="#model-mundo" position="6 1 4" scale="0.1 0.1 0.1" rotation="0 0 0" visible="false"></a-entity>
      
      <a-entity id="item-esqueleto" esqueleto-enemigo gltf-model="#model-esqueleto" position="-6 -1.2 3" scale="1 1 1" rotation="0 120 0" visible="false"></a-entity>


      <a-entity position="0 0 0">
        <a-camera wasd-controls-enabled="true" look-controls="true">
          <a-cursor color="#000000" radius="0.015"></a-cursor>

          <a-text id="texto-puntos" value="Puntos: 0 / 3" position="-0.7 0.5 -1" scale="0.4 0.4 0.4" color="#FFFFFF" font="mozillavr"></a-text>

          <a-text id="texto-pantalla" value="" align="center" position="0 0 -1.2" scale="0.5 0.5 0.5" color="#FF0000" font="mozillavr"></a-text>
        </a-camera>
      </a-entity>

      <a-entity light="type: ambient; intensity: 1.2; color: #ffffff"></a-entity>

    </a-scene>
  </body>
</html>
